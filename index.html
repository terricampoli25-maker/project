<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terri's Habit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Tangerine:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        .book-cover {
            width: 600px;
            height: 800px;
            background: linear-gradient(135deg, #1a3a52 0%, #0d2438 50%, #1a3a52 100%);
            border-radius: 8px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset -2px -2px 10px rgba(0, 0, 0, 0.5),
                inset 2px 2px 10px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
            border: 2px solid rgba(218, 165, 32, 0.3);
        }

        .book-cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(218, 165, 32, 0.03) 2px,
                    rgba(218, 165, 32, 0.03) 4px
                );
            pointer-events: none;
            border-radius: 8px;
        }

        .top-section {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 200px;
        }

        .title {
            font-family: 'Tangerine', cursive;
            font-size: 120px;
            font-weight: 700;
            color: #daa520;
            text-align: center;
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.7),
                0 0 20px rgba(218, 165, 32, 0.3);
            letter-spacing: 3px;
            line-height: 1.2;
        }

        .bottom-section {
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            height: 200px;
        }

        .open-button {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: #daa520;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: 2px solid #daa520;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(218, 165, 32, 0.5);
            box-shadow: 0 0 20px rgba(218, 165, 32, 0.2);
            letter-spacing: 2px;
            position: absolute;
            bottom: 30px;
            right: 30px;
        }

        .open-button:hover {
            background: rgba(218, 165, 32, 0.1);
            box-shadow: 0 0 30px rgba(218, 165, 32, 0.5);
            text-shadow: 0 0 20px rgba(218, 165, 32, 0.8);
            transform: scale(1.05);
        }

        .open-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .book-cover {
                width: 90%;
                height: 500px;
                max-width: 400px;
            }

            .title {
                font-size: 56px;
            }

            .open-button {
                font-size: 36px;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="book-cover">
        <div class="top-section">
            <div class="title">Terri's</div>
        </div>
        <div class="bottom-section">
            <button class="open-button" onclick="location.href='habit_tracker_new.html'">Open</button>
        </div>
    </div>
</body>
</html>
